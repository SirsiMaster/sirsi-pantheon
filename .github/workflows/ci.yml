name: CI — Sirsi Pantheon

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        shell: bash
        run: go test -v -race -short -coverprofile=coverage.out ./...
        env:
          CGO_ENABLED: 1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Ma'at Pulse — Dynamic Metrics
        shell: bash
        run: |
          go build -o sirsi ./cmd/sirsi/
          ./sirsi maat pulse --skip-test --json > metrics.json
          echo "=== Ma'at Pulse Metrics ==="
          cat metrics.json

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build sirsi
        run: go build -o sirsi${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/sirsi/

      - name: Build sirsi-agent
        run: go build -o sirsi-agent${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/sirsi-agent/
        env:
          CGO_ENABLED: '0'

      - name: Binary size guard (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          SIRSI_SIZE=$(stat -f%z sirsi 2>/dev/null || stat -c%s sirsi)
          AGENT_SIZE=$(stat -f%z sirsi-agent 2>/dev/null || stat -c%s sirsi-agent)
          echo "sirsi: ${SIRSI_SIZE} bytes"
          echo "sirsi-agent: ${AGENT_SIZE} bytes"
          if [ "$SIRSI_SIZE" -gt 26214400 ]; then
            echo "::warning::sirsi binary exceeds 25MB (${SIRSI_SIZE} bytes)"
          fi
          if [ "$AGENT_SIZE" -gt 12582912 ]; then
            echo "::warning::sirsi-agent binary exceeds 12MB (${AGENT_SIZE} bytes)"
          fi

      - name: Binary size guard (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $p_size = (Get-Item sirsi.exe).Length
          $a_size = (Get-Item sirsi-agent.exe).Length
          Write-Host "sirsi: $p_size bytes"
          Write-Host "sirsi-agent: $a_size bytes"
          if ($p_size -gt 26214400) { Write-Output "::warning::sirsi binary exceeds 25MB ($p_size bytes)" }
          if ($a_size -gt 12582912) { Write-Output "::warning::sirsi-agent binary exceeds 12MB ($a_size bytes)" }
