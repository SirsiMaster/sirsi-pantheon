name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (CLI + Deities)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests (skip CGO-dependent packages on Linux)
        env:
          CGO_ENABLED: "0"
        run: go test -short $(go list ./... | grep -v '/seba$\|/brain$\|/mcp$\|/ka$\|/tests/')

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  menubar:
    name: Build Menu Bar (macOS DMG)
    runs-on: macos-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          echo "VERSION=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG (arm64 — Intel Macs use Rosetta)
        env:
          BUILD_VERSION: ${{ steps.version.outputs.VERSION }}
        run: scripts/build-dmg.sh --version "$BUILD_VERSION" --arch arm64

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          BUILD_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release upload "$TAG_NAME" \
            "bin/SirsiPantheon-${BUILD_VERSION}-arm64.dmg"

