# goreleaser config — Sirsi Pantheon v0.8.0-beta
# Docs: https://goreleaser.com
version: 2

project_name: sirsi-pantheon

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: sirsi
    main: ./cmd/sirsi/
    binary: sirsi
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sirsi-agent
    main: ./cmd/sirsi-agent/
    binary: sirsi-agent
    env:
