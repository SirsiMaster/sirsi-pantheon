nfpms:
  - id: sirsi-pantheon
    package_name: sirsi-pantheon
    vendor: Sirsi Technologies
    homepage: https://sirsi.ai/pantheon
    description: "Unified DevOps Intelligence Platform"
    license: MPL-2.0
    maintainer: Sirsi Technologies <engineering@sirsi.ai>
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

