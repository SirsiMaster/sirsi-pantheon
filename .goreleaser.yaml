# goreleaser config — Sirsi Pantheon v0.8.0-beta
# Docs: https://goreleaser.com
version: 2

project_name: sirsi-pantheon

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: pantheon
    main: ./cmd/pantheon/
    binary: pantheon
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: pantheon-agent
    main: ./cmd/pantheon-agent/
    binary: pantheon-agent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    builds:
      - pantheon
      - pantheon-agent
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
      - goos: linux
        format: tar.gz
      - goos: darwin
        format: tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - configs/default_rules.yaml
      - configs/example_policy.yaml
      - configs/workspace_template.yaml

brews:
  - name: sirsi-pantheon
    repository:
      owner: SirsiMaster
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/SirsiMaster/sirsi-pantheon
    description: "🏛️ Unified DevOps Intelligence Platform — One Install, All Deities"
    license: MIT
    install: |
      bin.install "pantheon"
      bin.install "pantheon-agent"
    test: |
      system "#{bin}/pantheon", "version"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: SirsiMaster
    name: sirsi-pantheon
  name_template: "v{{.Version}}"
  prerelease: auto
  draft: false
  header: |
    ## 🏛️ Sirsi Pantheon {{.Version}}

    Unified DevOps Intelligence Platform — One Install, All Deities.

    ### Deities
    - 𓂀 **Anubis** — Infrastructure Hygiene (foundational)
    - 🪶 **Ma'at** — QA/QC Governance
    - 𓁟 **Thoth** — Persistent Knowledge

    ### Highlights
    - 64 scan rules across 7 categories, 27 internal modules
    - Mirror file deduplication — 27x faster than naive hashing
    - Trash-first cleaning with 29 hardcoded safety protections
    - Ma'at streaming governance audit with per-package progress
    - Thoth project memory system for AI-assisted development
    - MCP server for AI IDE integration (Claude, Cursor, Windsurf)
    - Scales policy engine for fleet enforcement
    - 1,500+ tests, ~85% weighted coverage, 0 lint errors

    ### Install
    ```bash
    brew tap SirsiMaster/tools && brew install sirsi-pantheon
    # or
    go install github.com/SirsiMaster/sirsi-pantheon/cmd/pantheon@{{.Tag}}
    ```
  footer: |
    ---
    *🏛️ One install. All deities. Nothing escapes the Weighing.*
