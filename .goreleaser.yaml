# goreleaser config — Sirsi Anubis v0.3.0-alpha
# Docs: https://goreleaser.com
version: 2

project_name: sirsi-anubis

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: anubis
    main: ./cmd/anubis/
    binary: anubis
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: anubis-agent
    main: ./cmd/anubis-agent/
    binary: anubis-agent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    builds:
      - anubis
      - anubis-agent
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
      - goos: linux
        format: tar.gz
      - goos: darwin
        format: tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - configs/default_rules.yaml
      - configs/example_policy.yaml
      - configs/workspace_template.yaml

