checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: SirsiMaster
    name: sirsi-anubis
  name_template: "v{{.Version}}"
  prerelease: auto
  draft: false
  header: |
    ## 𓂀 Sirsi Anubis {{.Version}}

    Infrastructure hygiene for the AI era.

    ### Highlights
    - 17 CLI commands, 58 scan rules, 17 internal modules
    - Mirror file deduplication — 27x faster than naive hashing
    - Trash-first cleaning with per-file decision log
    - Neural brain downloader + classifier interface
    - MCP server for AI IDE integration (Claude, Cursor, Windsurf)
    - Scales policy engine for fleet enforcement
    - 29 hardcoded safety protections, 453 tests, 15 test suites

    ### Install
    ```bash
    brew tap SirsiMaster/tools && brew install sirsi-anubis
    # or
    go install github.com/SirsiMaster/sirsi-anubis/cmd/anubis@{{.Tag}}
    ```
  footer: |
    ---
    *𓂀 The jackal sees everything. Nothing escapes the Weighing.*
