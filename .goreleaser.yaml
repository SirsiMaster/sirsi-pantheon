# goreleaser config — Sirsi Pantheon v0.8.0-beta
# Docs: https://goreleaser.com
version: 2

project_name: sirsi-pantheon

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: pantheon
    main: ./cmd/pantheon/
    binary: pantheon
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: pantheon-agent
    main: ./cmd/pantheon-agent/
    binary: pantheon-agent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    builds:
      - pantheon
      - pantheon-agent
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
      - goos: linux
        format: tar.gz
      - goos: darwin
        format: tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - configs/default_rules.yaml
      - configs/example_policy.yaml
      - configs/workspace_template.yaml

brews:
  - name: sirsi-pantheon
    repository:
      owner: SirsiMaster
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/SirsiMaster/sirsi-pantheon
    description: "🏛️ Unified DevOps Intelligence Platform — One Install, All Deities"
    license: MIT
    install: |
      bin.install "pantheon"
      bin.install "pantheon-agent"
    test: |
      system "#{bin}/pantheon", "version"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: SirsiMaster
    name: sirsi-pantheon
  name_template: "v{{.Version}}"
  prerelease: auto
  draft: false
  header: |
    ## Sirsi Pantheon {{.Version}}

    Infrastructure hygiene and developer intelligence. One binary.

    ### Core Features
    - **Scan** — 64 rules across 7 categories find infrastructure waste
    - **Ghosts** — Detect remnants of uninstalled apps (macOS + Linux)
    - **Dedup** — Find duplicate files with 3-phase hashing (27x faster than naive)
    - **Guard** — System resource monitoring with accelerator detection
    - **Thoth** — AI project memory (98.7% context compression)
    - **MCP Server** — 6 tools for AI IDE integration (Claude, Cursor, Windsurf, VS Code)

    ### Stats
    - 1,500+ tests, ~85% coverage, 0 lint errors
    - 28 packages, Apple Silicon first-class
    - Spotlight-accelerated file classification on macOS
    - Real BPE tokenizer for accurate token counting

    ### Install
    ```bash
    brew tap SirsiMaster/tools && brew install sirsi-pantheon
    # or
    go install github.com/SirsiMaster/sirsi-pantheon/cmd/pantheon@{{.Tag}}
    ```
  footer: |
    ---
    *Built by [Sirsi Technologies](https://sirsi.ai). MIT licensed.*
