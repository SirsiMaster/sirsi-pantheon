checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: SirsiMaster
    name: sirsi-pantheon
  name_template: "v{{.Version}}"
  prerelease: auto
  draft: false
  header: |
    ## Sirsi Pantheon {{.Version}}

    Infrastructure intelligence from one laptop to a fleet. 81 rules, zero config, zero telemetry.

    ---

    ### Download

    | Platform | Download | Notes |
    |----------|----------|-------|
    | **macOS (Apple Silicon)** | [`Pantheon.app` (DMG)](https://github.com/SirsiMaster/sirsi-pantheon/releases/download/v{{.Version}}/SirsiPantheon-{{.Version}}-arm64.dmg) | Menu bar + CLI. Intel Macs use Rosetta. |
    | **macOS / Linux (CLI)** | `brew tap SirsiMaster/tools && brew install sirsi-pantheon` | 7 CLI tools via Homebrew. |
    | **Windows** | [`Installer (zip)`](https://github.com/SirsiMaster/sirsi-pantheon/releases/download/v{{.Version}}/SirsiPantheon-{{.Version}}-windows-setup.zip) | Extract, run `install.bat` — adds `sirsi` to PATH. |
    | **Linux (deb)** | [`sirsi-pantheon_{{.Version}}_linux_amd64.deb`](https://github.com/SirsiMaster/sirsi-pantheon/releases/download/v{{.Version}}/sirsi-pantheon_{{.Version}}_linux_amd64.deb) | `sudo dpkg -i sirsi-pantheon_*.deb` |
    | **Linux (rpm)** | [`sirsi-pantheon_{{.Version}}_linux_amd64.rpm`](https://github.com/SirsiMaster/sirsi-pantheon/releases/download/v{{.Version}}/sirsi-pantheon_{{.Version}}_linux_amd64.rpm) | `sudo rpm -i sirsi-pantheon_*.rpm` |
    | **From source** | `go install github.com/SirsiMaster/sirsi-pantheon/cmd/sirsi@v{{.Version}}` | Requires Go 1.25+. |

    ### Quick Start
    ```bash
    sirsi scan       # Find waste (81 rules across 7 domains)
    sirsi doctor     # System health diagnostic
    sirsi ghosts     # Find remnants of uninstalled apps
    sirsi quickstart # Guided first scan with recommendations
    ```

    ### macOS Gatekeeper Note
    Pantheon.app is ad-hoc signed. On first launch, macOS may show "cannot be opened because the developer cannot be verified." Right-click the app → Open → Open. This only happens once. Notarized signing is coming with our Apple Developer enrollment.

  footer: |
    ---
    **2,251 tests across 36 packages. Zero telemetry. Apache 2.0 licensed.**

    [sirsi.ai/pantheon](https://sirsi.ai/pantheon) · [Documentation](https://github.com/SirsiMaster/sirsi-pantheon/blob/main/README.md) · [Changelog](https://github.com/SirsiMaster/sirsi-pantheon/blob/main/CHANGELOG.md)

    *Built by [Sirsi Technologies](https://sirsi.ai).*
