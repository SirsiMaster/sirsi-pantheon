archives:
  - id: default
    builds:
      - sirsi
      - sirsi-agent
      - sirsi-anubis
      - sirsi-maat
      - sirsi-thoth
      - sirsi-scarab
      - sirsi-guard
    name_template: >-
      sirsi-pantheon_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
      - goos: linux
        format: tar.gz
      - goos: darwin
        format: tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - configs/default_rules.yaml
      - configs/example_policy.yaml
      - configs/workspace_template.yaml

  - id: sirsi-anubis
