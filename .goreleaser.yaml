checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: SirsiMaster
    name: sirsi-pantheon
  name_template: "v{{.Version}}"
  prerelease: auto
  draft: false
  header: |
    ## Sirsi Pantheon {{.Version}}

    Infrastructure hygiene and developer intelligence. One binary.

    ### Core Features
    - **Scan** — 58 rules across 7 categories find infrastructure waste
    - **Ghosts** — Detect remnants of uninstalled apps (macOS + Linux)
    - **Dedup** — Find duplicate files with 3-phase hashing
    - **Network** — Security audit with DNS safety rollback
    - **Hardware** — CPU, GPU, ANE, CUDA detection
    - **Thoth** — AI project memory via MCP
    - **MCP Server** — Tools for AI IDE integration (Claude, Cursor, Windsurf, VS Code)

    ### Stats
    - 1,663 tests, ~85% coverage, 0 lint errors
    - 27 packages, Apple Silicon first-class
    - Spotlight-accelerated file classification on macOS
    - Real BPE tokenizer for accurate token counting

    ### Install
    ```bash
    brew tap SirsiMaster/tools && brew install sirsi-pantheon
    # or
    go install github.com/SirsiMaster/sirsi-pantheon/cmd/sirsi@{{.Tag}}
    ```
  footer: |
    ---
    *Built by [Sirsi Technologies](https://sirsi.ai). Apache 2.0 licensed.*
