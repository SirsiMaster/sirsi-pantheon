# goreleaser config — Sirsi Pantheon v0.8.0-beta
# Docs: https://goreleaser.com
version: 2

project_name: sirsi-pantheon

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: sirsi
    main: ./cmd/sirsi/
    binary: sirsi
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sirsi-agent
    main: ./cmd/sirsi-agent/
    binary: sirsi-agent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

  - id: sirsi-anubis
    main: ./cmd/anubis/
    binary: sirsi-anubis
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sirsi-maat
    main: ./cmd/maat/
    binary: sirsi-maat
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sirsi-thoth
    main: ./cmd/thoth/
    binary: sirsi-thoth
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sirsi-scarab
    main: ./cmd/scarab/
    binary: sirsi-scarab
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sirsi-guard
    main: ./cmd/guard/
    binary: sirsi-guard
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  # NOTE: sirsi-menubar requires CGO (systray) and cannot cross-compile.
  # It is macOS-only and built separately via `make dmg` or `scripts/build-dmg.sh`.
  # The DMG includes both sirsi-menubar and sirsi CLI in the Pantheon.app bundle.

archives:
  - id: default
    builds:
      - sirsi
      - sirsi-agent
      - sirsi-anubis
      - sirsi-maat
      - sirsi-thoth
      - sirsi-scarab
      - sirsi-guard
    name_template: >-
      sirsi-pantheon_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
      - goos: linux
        format: tar.gz
      - goos: darwin
        format: tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - configs/default_rules.yaml
      - configs/example_policy.yaml
      - configs/workspace_template.yaml

  - id: sirsi-anubis
    builds:
      - sirsi-anubis
