# .golangci.yml — Sirsi Pantheon linter configuration (golangci-lint v2)
# Rule A6: golangci-lint must pass with zero errors on every push/PR.

version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplification suggestions
    - govet         # Go vet checks
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - unused        # Check for unused code
    - gofmt         # Enforce gofmt formatting (Rule A6)
    - goimports     # Enforce import ordering
    - misspell      # Catch common misspellings
    - bodyclose     # Check for unclosed HTTP response bodies
    - copyloopvar   # Check for loop variable capture (Go 1.22+)

linters-settings:
  errcheck:
    exclude-functions:
      - fmt.Fprintln
      - fmt.Fprintf
      - (os.File).Close

  govet:
    enable-all: true
    disable:
      - fieldalignment

  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - linters:
        - unused
      text: "parameter .* always receives"

    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
