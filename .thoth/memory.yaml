## Critical Design Decisions
# 1. Three-phase dedup: size grouping → partial hash (first+last 4KB) → full SHA-256
#    Benchmark: 27.3x faster, 98.8% less disk I/O than naive approach
# 2. GUI uses Go HTTP server + embedded HTML (not React/Electron)
#    Folder picker: native macOS Finder via osascript (not browser webkitdirectory)
#    Filesystem browser: /api/browse endpoint returns real directory listings
# 3. Cleaning policy: ALWAYS trash first on macOS, per-file decision log, never auto-delete
#    DecisionLog persists to ~/.config/anubis/mirror/decisions/
# 4. Safety: 29 hardcoded protected paths including ~/Desktop, ~/Documents, etc.
# 5. "One Engine, Two Interfaces" — GUI and CLI get identical features
# 6. Free tier (Ankh): full dedup engine + GUI. Pro tier: ANE neural importance ranking
# 7. No telemetry (Rule A11). All analysis stays on-device.
# 8. Thoth knowledge system — three-layer persistent memory for AI sessions.
#    99.3% reduction in context needed to start working.
# 9. Build-in-public (ADR-003): every release updates VERSION, CHANGELOG,
#    BUILD_LOG.md, build-log.html, Thoth, and ADRs. Mistakes stay in the record.
#    Voice: direct verbs, never "the user wanted." Transparency is the product.
# 10. Statistics Integrity (Rule A14): every public-facing number must be
#     independently verifiable. No projections presented as measurements.
# 11. Session definition (Rule A15): a session = one AI conversation between
#     continuation prompts. Not time gaps, not commit clusters.
# 12. Pantheon is the product (ADR-005): all deities are sub-systems.
#     Deities keep repos and versions. Polyglot. Single install, single brand.
# 13. Portfolio Standard v2.1.0: 28 universal rules deployed to all 5 repos.
# 14. Independent Deity Deployment: deities can be installed standalone
#     (e.g., npx thoth-init) without platooning the entire Pantheon.
# 15. Cross-Agent Referral Logic: deities allude to other deities that
#     can act upon their findings (cohesive ecosystem, modular design).

