name: Pantheon

options:
  bundleIdPrefix: ai.sirsi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Pantheon:
    type: application
    platform: iOS
    sources:
      - path: Pantheon
        excludes:
          # Re-include when simulator runtimes are installed.
          # actool requires simulator runtimes even for device-only builds.
          # To enable: remove this exclude and run `xcodegen generate`.
          - "Assets.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sirsi.pantheon
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "0.9.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../bin/ios/PantheonCore.xcframework/ios-arm64"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - framework: "../bin/ios/PantheonCore.xcframework"
        embed: true
      - target: PantheonWidgets

  PantheonWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PantheonWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sirsi.pantheon.widgets
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "0.9.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: Pantheon Widgets
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../bin/ios/PantheonCore.xcframework/ios-arm64"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
    dependencies:
      - framework: "../bin/ios/PantheonCore.xcframework"
        embed: false
