<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ankh symbol -->
  <g fill="none" stroke="#C8A951" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Loop at top (oval/teardrop) -->
    <path d="
      M 32 24
      Q 32 4 22 4
      Q 12 4 12 14
      Q 12 24 32 24
      Q 52 24 52 14
      Q 52 4 42 4
      Q 32 4 32 24
    "/>
    <!-- Vertical shaft -->
    <line x1="32" y1="24" x2="32" y2="60"/>
    <!-- Horizontal crossbar -->
    <line x1="20" y1="34" x2="44" y2="34"/>
  </g>
</svg>
