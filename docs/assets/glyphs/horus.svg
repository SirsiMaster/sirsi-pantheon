<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Eye of Horus (Wedjat) -->
  <g fill="none" stroke="#C8A951" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Upper eyelid arc -->
    <path d="M 6 24 Q 18 10 32 10 Q 46 10 58 24"/>
    <!-- Lower eyelid arc -->
    <path d="M 10 24 Q 22 34 34 34 Q 46 34 54 24"/>
    <!-- Inner pupil -->
    <circle cx="32" cy="22" r="6" fill="#C8A951"/>
    <!-- Extended cosmetic tail (right side, curving up) -->
    <path d="M 54 24 Q 58 20 62 18" stroke-width="2.5"/>
    <!-- Brow line above -->
    <path d="M 4 20 Q 18 6 32 6 Q 46 6 60 16" stroke-width="2"/>

    <!-- Falcon teardrop/cheek marking below eye -->
    <path d="M 26 34 L 22 44 Q 20 50 18 54" stroke-width="2.5"/>
    <!-- Spiral curl at bottom of teardrop -->
    <path d="M 18 54 Q 16 56 18 58 Q 22 58 24 54 Q 24 50 22 48" stroke-width="2"/>
    <!-- Secondary line of the wedjat marking -->
    <path d="M 30 34 L 34 42 L 40 46" stroke-width="2"/>
  </g>
</svg>
